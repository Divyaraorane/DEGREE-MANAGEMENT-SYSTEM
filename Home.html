
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dairy Management System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* Background */

body{
background:
linear-gradient(rgba(0,60,0,0.65),rgba(0,40,0,0.65)),
url("imag1.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
min-height:100vh;
color:white;
}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:0 8px 25px rgba(0,0,0,0.2);
position:sticky;
top:0;
z-index:100;
}

/* Logo */

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:600;
}

.logo img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
}

/* Menu */

.menu{
display:flex;
list-style:none;
gap:20px;
}

.menu li{
border-radius:8px;
transition:0.3s;
}

.menu li a{
text-decoration:none;
color:white;
display:flex;
align-items:center;
padding:10px 14px;
gap:6px;
font-size:15px;
}

.menu li:hover{
background:rgba(255,255,255,0.15);
}

/* Hamburger */

.hamburger{
display:none;
font-size:24px;
cursor:pointer;
}

/* Content */

.content{
padding:80px 20px;
text-align:center;
max-width:900px;
margin:auto;
}

.content h1{
font-size:42px;
margin-bottom:15px;
}

.content p{
font-size:20px;
opacity:0.9;
}

/* Laptop */

@media(max-width:1200px){

.content h1{
font-size:36px;
}

.content p{
font-size:18px;
}

}

/* Tablet */

@media(max-width:992px){

.navbar{
padding:15px 25px;
}

.menu{
gap:12px;
}

.content h1{
font-size:32px;
}

}

/* Mobile */

@media(max-width:768px){

.hamburger{
display:block;
}

.menu{
position:absolute;
top:70px;
left:0;
width:100%;
background:rgba(0,0,0,0.9);
flex-direction:column;
align-items:center;
display:none;
}

.menu li{
width:100%;
border-top:1px solid rgba(255,255,255,0.2);
}

.menu li a{
padding:15px;
justify-content:center;
font-size:16px;
}

.menu.active{
display:flex;
}

.content{
padding:50px 15px;
}

.content h1{
font-size:26px;
}

.content p{
font-size:16px;
}

}

/* Small Mobile */

@media(max-width:480px){

.logo{
font-size:16px;
}

.logo img{
width:34px;
height:34px;
}

.content h1{
font-size:22px;
}

.content p{
font-size:14px;
}

}

</style>
</head>

<body>

<!-- Navbar -->

<div class="navbar">

<div class="logo">
<img src="imag.jpg">
Akshaya Farms
</div>

<ul class="menu" id="menu">

<li>
<a href="#">
<i class="fa fa-cheese"></i> Ghee
</a>
</li>

<li>
<a href="#">
<i class="fa fa-leaf"></i> Cow Fodder
</a>
</li>

<li>
<a href="#">
<i class="fa fa-users"></i> Staff
</a>
</li>

<li>
<a href="#">
<i class="fa fa-cow"></i> Cow Details
</a>
</li>

<li>
<a href="Milk Record.html">
<i class="fa fa-glass-water"></i> Milk Record
</a>
</li>

<li>
<a href="#">
<i class="fa fa-chart-line"></i> Reports
</a>
</li>

<li>
<a href="#">
<i class="fa fa-right-from-bracket"></i> Logout
</a>
</li>

</ul>

<div class="hamburger" onclick="toggleMenu()">
<i class="fa fa-bars"></i>
</div>

</div>

<!-- Content -->

<div class="content">

<h1>Dairy Management Dashboard</h1>
<p>Welcome to Akshaya Farms Dairy Management System</p>

</div>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

</script>

</body>
</html>
