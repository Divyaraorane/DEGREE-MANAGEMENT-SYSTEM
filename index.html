<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshaya Farms Dairy Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* Background */

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

background:
linear-gradient(rgba(0,26,60,0.65), rgba(0,60,0,0.65)),
url("imag1.jpg");

background-repeat:no-repeat;
background-position:center;
background-size:cover;
}

/* Login Card */

.login-container{

width:100%;
max-width:380px;
padding:40px;
border-radius:20px;

background:rgba(0,0,0,0.55);
backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.25);

color:white;
text-align:center;

box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* Logo */

.logo img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
margin-bottom:10px;
}

/* Titles */

h2{
margin-bottom:5px;
font-weight:600;
}

.subtitle{
font-size:14px;
margin-bottom:20px;
opacity:.9;
}

/* Input */

.input-group{
margin:15px 0;
text-align:left;
}

.input-group label{
font-size:14px;
}

.input-box{
display:flex;
align-items:center;
background:white;
border-radius:6px;
overflow:hidden;
margin-top:5px;
}

.input-box i{
padding:10px;
color:#145214;
}

.input-box input{
border:none;
outline:none;
padding:10px;
flex:1;
font-size:14px;
}

/* Login Button */

.login-btn{
width:100%;
padding:12px;
border-radius:8px;
border:none;
background:#1b7a1b;
color:white;
font-size:16px;
cursor:pointer;
margin-top:15px;
transition:.3s;
}

.login-btn:hover{
background:#0e4d0e;
}

/* Links */

.links{
margin-top:15px;
font-size:14px;
}

.links a{
color:#90ee90;
text-decoration:none;
display:block;
margin-top:8px;
}

.links a:hover{
text-decoration:underline;
}

/* Footer */

.footer{
margin-top:20px;
font-size:12px;
opacity:.8;
}

/* ---------------- RESPONSIVE DESIGN ---------------- */

/* Tablet */

@media(max-width:768px){

.login-container{
padding:30px;
}

.logo img{
width:80px;
height:80px;
}

}

/* Mobile */

@media(max-width:480px){

body{
align-items:flex-start;
padding-top:50px;
}

.login-container{
max-width:100%;
padding:25px;
}

h2{
font-size:20px;
}

.subtitle{
font-size:13px;
}

.input-box input{
font-size:13px;
}

.login-btn{
font-size:14px;
}

}

/* Small Mobile */

@media(max-width:360px){

.logo img{
width:70px;
height:70px;
}

.login-container{
padding:20px;
}

}

</style>
</head>

<body>

<div class="login-container">

<div class="logo">
<img src="imag.jpg">
</div>

<h2>Akshaya Farms</h2>

<p class="subtitle">Dairy Management System</p>

<form action="dashboard.html">

<div class="input-group">
<label>User Name</label>

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" placeholder="Enter Username" required>
</div>
</div>

<div class="input-group">
<label>Password</label>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="Enter Password" required>
</div>
</div>

<button class="login-btn">
<i class="fa fa-right-to-bracket"></i> Login
</button>

</form>

<div class="links">
<a href="register.html">📄 Create Account</a>
<a href="forgot-password.html">❓ Forgot Password</a>
</div>

<div class="footer">
© 2026 Akshaya Farms Dairy System
</div>

</div>

</body>
</html>
